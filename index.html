<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Editorial Archive</title>

<style>
body {
  margin: 0;
  padding: 40px;
  font-family: 'Georgia', serif;
  background: #3b0f1a;
  color: #f5e9e2;
}

h1 {
  text-align: center;
  margin-bottom: 10px;
  letter-spacing: 1px;
  color: #f2c4b3;
}

p {
  color: #e0b3a8;
}

.perfil {
  display: flex;
  justify-content: center;
  margin-top: 20px;
}

.perfil img {
  width: 160px;
  height: 160px;
  object-fit: cover;
  border-radius: 50%;
  border: 3px solid #a63a50;
  box-shadow: 0 5px 20px rgba(166, 58, 80, 0.5);
}

.seccion {
  margin-bottom: 50px;
}

.slider {
  display: flex;
  gap: 15px;
  overflow-x: auto;
  padding-bottom: 10px;
}

.slider img {
  height: 300px;
  border-radius: 12px;
  transition: transform 0.3s ease, opacity 0.3s ease, box-shadow 0.3s ease;
}

.slider img:hover {
  transform: scale(1.04);
  opacity: 0.95;
  box-shadow: 0 10px 30px rgba(166, 58, 80, 0.6);
}
</style>
</head>

<body>

<h1>Editorial Archive</h1>

<div class="perfil">
  <img src="perfil.jpg" alt="Retrato">
</div>

<p style="max-width:600px; margin:20px auto; text-align:center; line-height:1.6;">
Produzco contenido en el campo de las humanidades digitales y la curaduría editorial, con enfoque en cultura visual, lenguaje de consumo rápido y conocimiento público. Este archivo reúne una selección de trabajos en creación de contenido, investigación y diseño narrativo.
</p>
